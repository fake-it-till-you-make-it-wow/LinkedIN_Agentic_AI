# Pre-commit hooks — 커밋 전 린터/포맷터/테스트 강제
# 설치: uvx pre-commit install
# 수동 실행: uvx pre-commit run --all-files

repos:
  # ── Ruff: lint + format ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff format

  # ── MyPy: 타입 체크 ──
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.1
    hooks:
      - id: mypy
        name: mypy type check
        additional_dependencies:
          - fastapi>=0.115
          - sqlalchemy>=2.0
          - pydantic-settings>=2.0
          - httpx>=0.27
          - rich>=13.0
          - types-requests
        args: [--config-file=pyproject.toml]
        pass_filenames: false
        entry: mypy backend/ agents/

  # ── Pytest: 테스트 실행 ──
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # ── 기본 파일 검사 ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements
